<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Two Doors favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a237e"/>
      <stop offset="50%" stop-color="#283593"/>
      <stop offset="100%" stop-color="#4a148c"/>
    </linearGradient>
    <linearGradient id="doorL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#64b5f6"/>
      <stop offset="100%" stop-color="#1565c0"/>
    </linearGradient>
    <linearGradient id="doorR" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f48fb1"/>
      <stop offset="100%" stop-color="#ad1457"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#bg)"/>
  <!-- Frame -->
  <rect x="10" y="14" width="44" height="36" rx="3" fill="none" stroke="#ffffff44" stroke-width="2"/>
  <!-- Left door -->
  <rect x="12" y="16" width="18" height="32" rx="2" fill="url(#doorL)"/>
  <!-- Left door handle -->
  <circle cx="28" cy="32" r="2" fill="#ffd54f"/>
  <!-- Right door -->
  <rect x="34" y="16" width="18" height="32" rx="2" fill="url(#doorR)"/>
  <!-- Right door handle -->
  <circle cx="36" cy="32" r="2" fill="#ffd54f"/>
  <!-- Ground line -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#ffffff66" stroke-width="1.5"/>
  <!-- Star above -->
  <circle cx="32" cy="10" r="2" fill="#ffd54f"/>
</svg>
