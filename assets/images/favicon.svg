<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <title>VK — Power Platform Solution Architect</title>
  <defs>
    <!-- Deep indigo background gradient -->
    <linearGradient id="fvBg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#312E81"/>
    </linearGradient>
    <!-- Subtle top-left radial highlight -->
    <radialGradient id="fvShine" cx="30%" cy="22%" r="52%">
      <stop offset="0%"   stop-color="#4338ca" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#4338ca" stop-opacity="0"/>
    </radialGradient>
    <!-- V arm gradient: white top to indigo base -->
    <linearGradient id="fvArm" x1="50" y1="16" x2="50" y2="80" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="55%"  stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <!-- Nexus node glow -->
    <filter id="fvGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Terminal dot glow -->
    <filter id="fvDotGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="1.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="100" height="100" rx="22" fill="url(#fvBg)"/>
  <rect width="100" height="100" rx="22" fill="url(#fvShine)"/>

  <!-- Blueprint diagonal grid (very faint, 14% opacity) -->
  <g stroke="#5b58db" stroke-width="0.5" opacity="0.14">
    <line x1="0"  y1="20"  x2="20"  y2="0"/>
    <line x1="0"  y1="50"  x2="50"  y2="0"/>
    <line x1="0"  y1="80"  x2="80"  y2="0"/>
    <line x1="20" y1="100" x2="100" y2="20"/>
    <line x1="50" y1="100" x2="100" y2="50"/>
    <line x1="80" y1="100" x2="100" y2="80"/>
  </g>

  <!-- V mark: left arm (16,18) to (50,78) -->
  <line x1="16" y1="18" x2="50" y2="78"
        stroke="url(#fvArm)" stroke-width="8.5" stroke-linecap="round"/>

  <!-- V mark: right arm (84,18) to (50,78) -->
  <line x1="84" y1="18" x2="50" y2="78"
        stroke="url(#fvArm)" stroke-width="8.5" stroke-linecap="round"/>

  <!-- Precision ticks on left arm — perpendicular to arm direction
       Arm direction (34,60), perp unit (-0.870, 0.493), tick ±3.5px
       1/3 point (27.3, 38) -->
  <line x1="24.3" y1="39.7" x2="30.3" y2="36.3"
        stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>
  <!-- 2/3 point (38.7, 58) -->
  <line x1="35.7" y1="59.7" x2="41.7" y2="56.3"
        stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>

  <!-- Precision ticks on right arm — perpendicular to arm direction
       Arm direction (-34,60), perp unit (-0.870,-0.493)
       1/3 point (72.7, 38) -->
  <line x1="69.7" y1="36.3" x2="75.7" y2="39.7"
        stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>
  <!-- 2/3 point (61.3, 58) -->
  <line x1="58.3" y1="56.3" x2="64.3" y2="59.7"
        stroke="#818cf8" stroke-width="2.5" stroke-linecap="round" opacity="0.72"/>

  <!-- Left circuit terminal node -->
  <line x1="7" y1="18" x2="16" y2="18"
        stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <circle cx="16" cy="18" r="5.5" fill="#1a1848" stroke="#6366f1" stroke-width="2"/>
  <circle cx="16" cy="18" r="2.5" fill="#e0e7ff" filter="url(#fvDotGlow)"/>

  <!-- Right circuit terminal node -->
  <line x1="84" y1="18" x2="93" y2="18"
        stroke="#6366f1" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>
  <circle cx="84" cy="18" r="5.5" fill="#1a1848" stroke="#6366f1" stroke-width="2"/>
  <circle cx="84" cy="18" r="2.5" fill="#e0e7ff" filter="url(#fvDotGlow)"/>

  <!-- Vertex nexus node — AI intelligence junction -->
  <!-- Outer pulse ring -->
  <circle cx="50" cy="78" r="10"   fill="none" stroke="#4f46e5" stroke-width="0.8" opacity="0.35"/>
  <!-- Inner ring -->
  <circle cx="50" cy="78" r="6.5"  fill="none" stroke="#6366f1" stroke-width="1.5" opacity="0.65"/>
  <!-- Node body -->
  <circle cx="50" cy="78" r="4"    fill="#1e1b4b" stroke="#a5b4fc" stroke-width="1.5"/>
  <!-- Core glow -->
  <circle cx="50" cy="78" r="2.2"  fill="white" filter="url(#fvGlow)"/>
</svg>
