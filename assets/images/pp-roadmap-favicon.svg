<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Power Platform AI Architect Roadmap favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1117"/>
      <stop offset="40%" stop-color="#1b0c40"/>
      <stop offset="100%" stop-color="#7c6af7"/>
    </linearGradient>
  </defs>
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#bg)"/>
  <!-- Roadmap path -->
  <path d="M14 50 Q20 40 26 32 Q32 24 38 20 Q44 16 50 14" fill="none" stroke="#7c6af7" stroke-width="3" stroke-linecap="round"/>
  <!-- Milestone dots -->
  <circle cx="14" cy="50" r="3.5" fill="#3ecf8e"/>
  <circle cx="26" cy="32" r="3.5" fill="#f5a623"/>
  <circle cx="38" cy="20" r="3.5" fill="#4a9eff"/>
  <circle cx="50" cy="14" r="4" fill="#ff4e9d"/>
  <!-- Arrow head at top -->
  <polyline points="46,11 50,14 47,18" fill="none" stroke="#ff4e9d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- LPA label -->
  <text x="32" y="58" text-anchor="middle" font-size="6" font-family="Segoe UI, Arial, sans-serif" font-weight="700" fill="#7c6af7" letter-spacing="0.5">ROADMAP</text>
</svg>
