<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="SPFx Interview Field Manual favicon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B5FFF"/>
      <stop offset="50%" stop-color="#0050E6"/>
      <stop offset="100%" stop-color="#003DB3"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#E6EEFF"/>
      <stop offset="100%" stop-color="#C8D9FF"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect x="4" y="4" width="56" height="56" rx="12" fill="url(#bg)"/>
  <!-- Book / manual shape -->
  <rect x="13" y="12" width="28" height="38" rx="3" fill="url(#page)"/>
  <!-- Spine -->
  <rect x="13" y="12" width="5" height="38" rx="2" fill="#3E82FF" opacity="0.6"/>
  <!-- Code lines on page -->
  <line x1="22" y1="21" x2="37" y2="21" stroke="#0B5FFF" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="27" x2="34" y2="27" stroke="#0B5FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="33" x2="36" y2="33" stroke="#0B5FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <line x1="22" y1="39" x2="32" y2="39" stroke="#0B5FFF" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  <!-- SPFx badge -->
  <rect x="35" y="38" width="18" height="12" rx="4" fill="#FFB300"/>
  <text x="44" y="47.5" font-family="monospace" font-size="7" font-weight="700" fill="#14131F" text-anchor="middle">SPFx</text>
</svg>
